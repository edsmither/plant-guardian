:root, [data-theme="dark"] {

  <script>
    window.storage = {
      get: (key) => Promise.resolve(localStorage.getItem(key) ? { key, value: localStorage.getItem(key) } : null),
      set: (key, value) => { localStorage.setItem(key, value); return Promise.resolve({ key, value }); },
      delete: (key) => { localStorage.removeItem(key); return Promise.resolve({ key, deleted: true }); },
      list: (prefix) => {
        const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
        return Promise.resolve({ keys: keys.map(k => ({ name: k })) });
      }
    };

function bTL(groups, wx) {
  if (!wx || !groups.length) return [];
  const d = wx.daily, days = [];
  for (let i = 0; i < d.time.length; i++) {
    const dt = new Date(d.time[i]+"T12:00:00"), hi = d.temperature_2m_max[i], lo = d.temperature_2m_min[i], wi = d.wind_speed_10m_max[i], ra = d.precipitation_sum[i], iss = [];
    for (const g of groups) { const ha=g.heatAdj||0, ca=g.coldAdj||0, wa=g.windAdj||0;
      for (const p of g.plants) { if (p.indoors) continue; const emx=p.max_temp_f+ha, emn=p.min_temp_f-ca, ew=p.max_wind_mph+wa;
        if (hi>emx) iss.push({plant:p.common_name,type:"heat",icon:"🌡️"});
        if (lo<emn) iss.push({plant:p.common_name,type:"cold",icon:"❄️"});
        if (wi>ew) iss.push({plant:p.common_name,type:"wind",icon:"💨"});
        if (p.rain_sensitive&&ra>0.1) iss.push({plant:p.common_name,type:"rain",icon:"🌧️"});
      }
    }
    days.push({date:d.time[i],dayName:i===0?"Today":i===1?"Tmrw":DN[dt.getDay()].slice(0,3),dateLabel:`${MN[dt.getMonth()]} ${dt.getDate()}`,high:hi,low:lo,wind:wi,rain:ra,wc:d.weathercode[i],issues:iss,rainCollect:ra>0.1});
  }
  return days;
}

function gPS(name,tl,dis) {
  if (!tl.length) return "ok";
  const t=tl[0], iss=t.issues.filter(i=>i.plant===name&&i.type!=="rain");
  if (!iss.length) return "ok";
  const types=[...new Set(iss.map(i=>i.type))];
  if (types.every(t2=>dis[`${t.date}-${t2}`])) return "resolved";
  return iss[0].type;
}

function getConsecHeatDays(tl) {
  let n = 0;
  for (const day of tl) { if (day.issues.some(i=>i.type==="heat")) n++; else break; }
  return n;
}

const sanitize = (str, maxLen=200) => {
  if (typeof str !== "string") return "";
  return str.replace(/[<>&"'`]/g, "").slice(0, maxLen).trim();
};
const safeInt = (val, fallback=0, min=-50, max=200) => {
  const n = Number(val);
  return isFinite(n) ? Math.min(max, Math.max(min, n)) : fallback;
};
const validateGroup = (g) => {
  if (!g || typeof g !== "object") return null;
  if (typeof g.id !== "string" && typeof g.id !== "number") return null;
  return {
    id: String(g.id).slice(0, 40),
    name: sanitize(g.name || "My Plants", 60),
    plants: Array.isArray(g.plants) ? g.plants.slice(0, 200).map(validatePlant).filter(Boolean) : [],
    heatAdj: safeInt(g.heatAdj, 0, 0, 30),
    coldAdj: safeInt(g.coldAdj, 0, 0, 30),
    windAdj: safeInt(g.windAdj, 0, 0, 20),
    addedAt: typeof g.addedAt === "string" ? g.addedAt.slice(0, 30) : new Date().toISOString(),
  };
};
const validatePlant = (p) => {
  if (!p || typeof p !== "object") return null;
  if (typeof p.common_name !== "string" || !p.common_name.trim()) return null;
  return {
    common_name: sanitize(p.common_name, 80),
    scientific_name: sanitize(p.scientific_name || "", 80),
    min_temp_f: safeInt(p.min_temp_f, 50, -20, 100),
    max_temp_f: safeInt(p.max_temp_f, 95, 40, 130),
    max_wind_mph: safeInt(p.max_wind_mph, 20, 0, 80),
    rain_sensitive: !!p.rain_sensitive,
    drought_tolerant: !!p.drought_tolerant,
    notes: sanitize(p.notes || "", 300),
    indoors: !!p.indoors,
  };
};
const validateStoredData = (raw) => {
  try {
    const d = typeof raw === "string" ? JSON.parse(raw) : raw;
    if (!d || typeof d !== "object") return null;
    return {
      groups: Array.isArray(d.groups) ? d.groups.slice(0, 20).map(validateGroup).filter(Boolean) : [],
      zip: typeof d.zip === "string" ? d.zip.replace(/\D/g,"").slice(0,5) : "78641",
      loc: (d.loc && isFinite(d.loc.lat) && isFinite(d.loc.lon)) ? { lat: Number(d.loc.lat), lon: Number(d.loc.lon) } : null,
      dismissed: (d.dismissed && typeof d.dismissed === "object") ? d.dismissed : {},
      actionLog: Array.isArray(d.actionLog) ? d.actionLog.slice(-500) : [],
      wateringLog: Array.isArray(d.wateringLog) ? d.wateringLog.slice(-200) : [],
      alertAckedDate: typeof d.alertAckedDate === "string" ? d.alertAckedDate.slice(0,10) : "",
    };
  } catch { return null; }
};

  const isCollapsed=!!collapsed[sKey];
  return (
    <div style={{background:"var(--panel)",borderRadius:8,border:"1px solid var(--line)",marginBottom:12,overflow:"hidden"}}>
      <div onClick={()=>onToggle(sKey)} style={{padding:"14px 16px 12px",cursor:"pointer",userSelect:"none"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,fontWeight:500,letterSpacing:"0.28em",textTransform:"uppercase",color:"var(--ink-3)"}}>
            <span style={{color:"var(--mint)"}}>{num}</span> · {label}{meta?` · ${meta}`:""}
          </div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"var(--ink-3)"}}>{isCollapsed?"+":"–"}</div>
        </div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,letterSpacing:"0.22em",textTransform:"uppercase",color:"var(--amber)",marginTop:3}}>{title}</div>
      </div>
      {!isCollapsed&&<div style={{padding:"0 16px 16px"}}>{children}</div>}
    </div>
  );
}


function Donut({pct,label,sub,color,centerText}){
  const r=32, circ=2*Math.PI*r;
  const dash=Math.max(0,Math.min(1,pct))*circ;
  return (
    <div style={{textAlign:"center",flex:1}}>
      <svg width="92" height="92" viewBox="0 0 92 92">
        <circle cx="46" cy="46" r="32" fill="none" stroke="var(--line)" strokeWidth="6"/>
        <circle cx="46" cy="46" r="32" fill="none" stroke={color} strokeWidth="6"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform="rotate(-90 46 46)"/>
        <text x="46" y="44" textAnchor="middle" fontSize="20" fontWeight="800" fill="var(--ink)"
          fontFamily="'Barlow Condensed',sans-serif" style={{fontVariantNumeric:"tabular-nums"}}>{centerText}</text>
        <text x="46" y="58" textAnchor="middle" fontSize="8" fill="var(--ink-3)"
          fontFamily="'JetBrains Mono',monospace" letterSpacing="0.1em">{sub}</text>
      </svg>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.22em",textTransform:"uppercase",color:"var(--ink-3)",marginTop:2}}>{label}</div>
    </div>
  );
}

  useEffect(()=>{if(!ready)return;const t=setTimeout(()=>{(async()=>{try{await window.storage.set("pg-data",JSON.stringify({groups,zip:savedZip,loc,dismissed,actionLog,wateringLog,alertAckedDate,heatThreshold,climate,yearTally,theme,collapsed}));}catch(e){}})();},300);return()=>clearTimeout(t);},[groups,savedZip,loc,ready,dismissed,actionLog,wateringLog,alertAckedDate,heatThreshold,climate,yearTally,theme,collapsed]);
  useEffect(()=>{
    if(!loc)return;
    const today=new Date(),dates=[];
    for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()+i);dates.push(d.toISOString().split("T")[0]);}
    if(testMode){
      setWx({current:{temperature_2m:95},daily:{time:dates,temperature_2m_max:[97,98,96,99,97,95,98],temperature_2m_min:[42,44,41,43,42,40,44],wind_speed_10m_max:[22,18,24,20,26,22,19],precipitation_sum:[0,0,0.5,0.8,0,1.2,0],weathercode:[1,2,61,63,2,61,2]}});
      return;
    }
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m&daily=temperature_2m_max,temperature_2m_min,wind_speed_10m_max,precipitation_sum,weathercode&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&forecast_days=7&timezone=America%2FChicago`;
    fetch(url)
      .then(r=>r.ok?r.json():Promise.reject(r.status))
      .then(data=>setWx(data))
      .catch(e=>{
        console.warn("Weather fetch failed, using fallback:",e);
        setWx({current:null,daily:{time:dates,temperature_2m_max:[88,90,92,89,87,91,88],temperature_2m_min:[68,70,71,69,67,70,69],wind_speed_10m_max:[12,10,14,11,13,15,10],precipitation_sum:[0,0,0,0.2,0,0,0],weathercode:[1,2,2,3,2,1,2]}});
      });
  },[loc,testMode]);
  useEffect(()=>{setTimeline(bTL(groups,wx));},[groups,wx]);

  // Daily tally — record today's heat/rain once per day into a year-keyed log
  useEffect(()=>{
    if(!ready||!wx||testMode)return;
    const today=new Date().toISOString().split("T")[0];
    const year=today.slice(0,4);
    const todayHigh=wx.daily.temperature_2m_max[0];
    const todayRain=wx.daily.precipitation_sum[0];
    setYearTally(prev=>{
      const yearData=prev[year]||{heatDays:[],rainDays:[]};
      let changed=false;
      const heatDays=[...yearData.heatDays];
      const rainDays=[...yearData.rainDays];
      if(todayHigh>=heatThreshold&&!heatDays.includes(today)){heatDays.push(today);changed=true;}
      if(todayRain>=0.1&&!rainDays.includes(today)){rainDays.push(today);changed=true;}
      if(!changed)return prev;
      return {...prev,[year]:{heatDays,rainDays}};
    });
  },[ready,wx,heatThreshold,testMode]);


  // Fetch climate baselines + this year's retroactive count.
  // Outdoor season window = Mar 21 -> Dec 21.
  useEffect(()=>{
    if(!ready||!loc||testMode)return;
    const thisYear=new Date().getFullYear();
    const seasonKey=`${loc.lat.toFixed(2)},${loc.lon.toFixed(2)}-${thisYear}-${heatThreshold}`;
    // Refetch if key changed OR if we don't have today's count yet
    const todayStr=new Date().toISOString().split("T")[0];
    if(climate&&climate.key===seasonKey&&climate.countedThrough===todayStr)return;

    const seasonStart=(y)=>`${y}-03-21`;
    const seasonEnd=(y)=>`${y}-12-21`;
    const countWindow=(daily)=>{
      const highs=daily.temperature_2m_max||[];
      const precip=daily.precipitation_sum||[];
      let heat=0,rain=0;
      for(let i=0;i<highs.length;i++){
        if(highs[i]!=null&&highs[i]>=heatThreshold)heat++;
        if(precip[i]!=null&&precip[i]>=0.1)rain++;
      }
      return {heat,rain};
    };
    const fetchRange=(start,end)=>{
      const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${loc.lat}&longitude=${loc.lon}&start_date=${start}&end_date=${end}&daily=temperature_2m_max,precipitation_sum&temperature_unit=fahrenheit&precipitation_unit=inch&timezone=America%2FChicago`;
      return fetch(url).then(r=>r.ok?r.json():Promise.reject(r.status));
    };

    // Historical: 3 prior years, full Mar21-Dec21 window for the average
    const histYears=[thisYear-1,thisYear-2,thisYear-3];
    // This year: Mar 21 -> yesterday (archive lags ~1-2 days; today comes from daily tally)
    const yesterday=new Date(Date.now()-86400000).toISOString().split("T")[0];

    Promise.all([
      ...histYears.map(y=>fetchRange(seasonStart(y),seasonEnd(y)).catch(()=>null)),
      fetchRange(seasonStart(thisYear),yesterday).catch(()=>null),
    ]).then(results=>{
      const histData=results.slice(0,3).filter(Boolean);
      const thisYearData=results[3];
      if(!histData.length){console.warn("Climate history unavailable");return;}
      let totHeat=0,totRain=0;
      for(const d of histData){
        const c=countWindow(d.daily);
        totHeat+=c.heat;totRain+=c.rain;
      }
      const ty=thisYearData?countWindow(thisYearData.daily):{heat:0,rain:0};
      setClimate({
        key:seasonKey,
        avgHeatDays:Math.round(totHeat/histData.length),
        avgRainDays:Math.round(totRain/histData.length),
        yearsSampled:histData.length,
        baseHeatCount:ty.heat,
        baseRainCount:ty.rain,
        countedThrough:thisYearData?todayStr:null,
      });
    }).catch(e=>console.warn("Climate fetch failed:",e));
  },[ready,loc,heatThreshold,testMode]);

  // Heat progress — archive retroactive count + live daily tally, vs historical avg
  const getHeatProgress=()=>{
    if(!climate)return null;
    const year=String(new Date().getFullYear());
    const tallyDays=(yearTally[year]&&yearTally[year].heatDays)||[];
    // tally days after the archive cutoff add to the archive base count
    const cutoff=climate.countedThrough;
    const tallyExtra=cutoff?tallyDays.filter(d=>d>=cutoff).length:tallyDays.length;
    const counted=(climate.baseHeatCount||0)+tallyExtra;
    const avg=climate.avgHeatDays||1;
    return {counted,avg,pct:Math.min(1,counted/avg),remaining:Math.max(0,avg-counted)};
  };

  // Rain progress — archive retroactive count + live daily tally, vs historical avg
  const getRainProgress=()=>{
    if(!climate)return null;
    const year=String(new Date().getFullYear());
    const tallyDays=(yearTally[year]&&yearTally[year].rainDays)||[];
    const cutoff=climate.countedThrough;
    const tallyExtra=cutoff?tallyDays.filter(d=>d>=cutoff).length:tallyDays.length;
    const counted=(climate.baseRainCount||0)+tallyExtra;
    const avg=climate.avgRainDays||1;
    return {counted,avg,pct:Math.min(1,counted/avg),remaining:Math.max(0,avg-counted)};
  };


  // On load — fire once per day
  useEffect(()=>{
    if(!ready||!groups.length||!timeline.length)return;
    const today=new Date().toISOString().split("T")[0];
    if(alertAckedDate===today)return;
    const lastW=wateringLog[wateringLog.length-1];
    const lastWDate=lastW?new Date(lastW.date+"T12:00:00"):new Date(Date.now()-6*86400000);
    let consecH=0;for(const d of timeline){if(d.issues.some(i=>i.type==="heat"))consecH++;else break;}
    const interval=consecH>=4?6:7;
    const nextW=new Date(lastWDate);nextW.setDate(lastWDate.getDate()+interval);
    const daysLeft=Math.ceil((nextW-new Date())/86400000);
    const wi={daysLeft,earlyTrigger:consecH>=4};
    const todayIssues=timeline[0].issues.filter(i=>i.type!=="rain");
    const msgs=[];
    if(wi.daysLeft===0){msgs.push({icon:"💧",text:wi.earlyTrigger?`Heat alert for ${getConsecHeatDays(timeline)} consecutive days — water your plants today.`:"Your plants are due for watering today."});}
    if(todayIssues.length>0){const types=[...new Set(todayIssues.map(i=>i.type))];const plants=[...new Set(todayIssues.map(i=>i.plant))];const icons={heat:"🌡️",cold:"❄️",wind:"💨"};msgs.push({icon:types.map(t=>icons[t]).join(""),text:`${plants.join(", ")} — ${types.map(t=>t==="heat"?"above typical range":t==="cold"?"below comfort overnight":"high wind").join(" & ")} today.`});}
    if(msgs.length>0)setAlertModal(msgs);
  },[ready,timeline]);

  // On plant add — always alert for newly added plants regardless of alertAckedDate
  useEffect(()=>{
    if(!ready||!timeline.length)return;
    const allNames=groups.flatMap(g=>g.plants.map(p=>p.common_name));
    const prevNames=prevPlantsRef.current;
    const newNames=allNames.filter(n=>!prevNames.includes(n));
    prevPlantsRef.current=allNames;
    if(!newNames.length)return;
    const todayIssues=timeline[0].issues.filter(i=>i.type!=="rain"&&newNames.includes(i.plant));
    if(!todayIssues.length)return;
    const types=[...new Set(todayIssues.map(i=>i.type))];
    const plants=[...new Set(todayIssues.map(i=>i.plant))];
    const icons={heat:"🌡️",cold:"❄️",wind:"💨"};
    setAlertModal([{icon:types.map(t=>icons[t]).join(""),text:`${plants.join(", ")} — ${types.map(t=>t==="heat"?"above typical range":t==="cold"?"below comfort overnight":"high wind").join(" & ")} today.`}]);
  },[groups,timeline,ready]);

  const resolveAlert=(date,type,plants,action)=>{setDismissed(p=>({...p,[`${date}-${type}`]:action}));setActionLog(p=>[...p,{date,type,plants:plants||[],action,timestamp:new Date().toISOString()}]);};
  const markBack=(name)=>{setGroups(p=>p.map(g=>({...g,plants:g.plants.map(pl=>pl.common_name===name?{...pl,indoors:false}:pl)})));setActionLog(p=>[...p,{date:new Date().toISOString().split("T")[0],type:"return",plants:[name],action:"back-outside",timestamp:new Date().toISOString()}]);};

  const saveGroup=()=>{if(!selP.length||saving)return;setSaving(true);const safeName=sanitize(gName,60)||`Patio Group ${groups.length+1}`;

  };

  const openWaterModal = () => {
    setWaterNotes("");

  };

  const getWateringInfo = () => {
    const last = wateringLog[wateringLog.length - 1];
    const lastDate = last ? new Date(last.date + "T12:00:00") : new Date(Date.now() - 6*86400000);
    const consecHeat = getConsecHeatDays(timeline);
    const interval = consecHeat >= 4 ? 6 : 7;
    const nextDate = new Date(lastDate);
    nextDate.setDate(lastDate.getDate() + interval);
    const now = new Date();
    const daysLeft = Math.ceil((nextDate - now) / 86400000);
    const earlyTrigger = consecHeat >= 4;
    if (daysLeft <= 0) return { label:"Today", sub: earlyTrigger?"heat trigger":"weekly", color:dk.teal, earlyTrigger, daysLeft:0, nextDate, interval };
    return { label:String(daysLeft), sub:DN[nextDate.getDay()], color: daysLeft<=2?dk.gold:dk.mutedLight, earlyTrigger, daysLeft, nextDate, interval };
  };

  const allP=groups.flatMap(g=>g.plants);
  const outP=allP.filter(p=>!p.indoors);
  const inP=allP.filter(p=>p.indoors);
  const todayI=timeline.length>0?timeline[0].issues.filter(i=>i.type!=="rain"):[];
  const todayAC=todayI.length;
  const todayR=timeline.length>0&&timeline[0].rainCollect;
  const filtered=sq.length>0?PL.filter(p=>p.n.toLowerCase().includes(sq.trim().toLowerCase())||p.s.toLowerCase().includes(sq.trim().toLowerCase())):[];
  const waterInfo = groups.length > 0 ? getWateringInfo() : null;

  const getTA = () => {
    if (!timeline.length) return {};
    const day=timeline[0],pr=["cold","heat","wind"],bp={};
    for (const iss of day.issues) {if(iss.type==="rain")continue;if(!bp[iss.plant])bp[iss.plant]=new Set();bp[iss.plant].add(iss.type);}
    const ba={};for(const[plant,types]of Object.entries(bp)){const top=pr.find(t=>types.has(t))||[...types][0];if(!ba[top])ba[top]=[];ba[top].push(plant);}return ba;
  };

  const dismissAlertModal = () => {
    const today = new Date().toISOString().split("T")[0];
    setAlertAckedDate(today);
    setAlertModal(null);
  };

  const urlB64ToUint8Array = (base64String) => {
    const padding = "=".repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(base64);
    return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
  };

  const registerPush = async () => {
    if (pushPending) return;
    setPushPending(true);
    try {
      if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
        alert("Push notifications aren't supported in this browser. Try adding the app to your home screen first.");
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== "granted") { setPushPending(false); return; }

      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
        });
      }
      const res = await fetch(`${WORKER_URL}/subscribe`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sub.toJSON()),
      });
      if (res.ok) {
        setPushEnabled(true);
        window.storage.set("pg-push", "enabled").catch(()=>{});
      }
    } catch (e) {
      console.error("Push registration failed:", e);
    } finally {
      setPushPending(false);
    }
  };

  const unregisterPush = async () => {
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        await fetch(`${WORKER_URL}/subscribe`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint: sub.endpoint }),
        });
        await sub.unsubscribe();
      }
      setPushEnabled(false);
      window.storage.delete("pg-push").catch(()=>{});
    } catch (e) {
      console.error("Unsubscribe failed:", e);
    }
  };

  const getPlantGroup = (plantName) => {
    for (const g of groups) { if (g.plants.find(p=>p.common_name===plantName)) return g; }
    return null;
  };

  return (
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:"var(--bg)",minHeight:"100vh",maxWidth:480,margin:"0 auto",color:"var(--ink)",position:"relative",overflow:"hidden"}}>
      {/* Aurora borealis background */}
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,maxWidth:480,margin:"0 auto",pointerEvents:"none",zIndex:0,
        background:`
          radial-gradient(ellipse 80% 50% at 20% 0%, rgba(45,212,191,0.13), transparent 60%),
          radial-gradient(ellipse 70% 45% at 85% 8%, rgba(56,189,170,0.10), transparent 55%),
          radial-gradient(ellipse 90% 40% at 50% 100%, rgba(192,132,252,0.08), transparent 60%),
          radial-gradient(ellipse 60% 35% at 80% 92%, rgba(232,185,49,0.06), transparent 55%)
        `}}/>
      <div style={{position:"relative",zIndex:1}}>

      <div style={{padding:"10px 16px 14px",borderBottom:"1px solid var(--line)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <StencilDisc size={36}/>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,letterSpacing:"0.18em",color:"var(--ink)",textTransform:"uppercase"}}>Plant Guardian</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {scr==="home"&&wx&&(
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:6,height:6,borderRadius:3,background:"var(--mint)",boxShadow:"0 0 8px var(--mint)",animation:"pgpulse 2s ease-in-out infinite"}}/>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.12em",color:"var(--ink-3)"}}>
                <span style={{color:"var(--mint)"}}>LIVE</span>
              </span>
            </div>
          )}
          {scr==="home"&&<button onClick={()=>setScr("set")} style={{background:"var(--panel)",border:"1px solid var(--line-2)",borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:13,color:"var(--ink-3)"}}>⚙</button>}
        </div>
      </div>

            {selP.map((p,i)=>(<div key={i} onClick={()=>setSelP(prev=>prev.filter((_,j)=>j!==i))} style={{padding:"6px 10px",borderRadius:8,background:dk.tealDim,cursor:"pointer"}}>
              <div style={{fontSize:11,fontWeight:600,color:dk.white}}>{p.common_name} ✕</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.6)",marginTop:2}}>🌡️{p.min_temp_f}–{p.max_temp_f}°F · 💨≤{p.max_wind_mph}mph{p.rain_sensitive?" · 🌧️":""}</div>
            </div>))}
          </div>}

          <div style={cs}>
            <input type="text" value={sq} onChange={e=>setSq(e.target.value.slice(0,100))} placeholder="Search plants..." maxLength={100}
              style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${dk.border}`,fontSize:15,background:dk.bg,color:dk.white,outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:filtered.length>0||sq.length>0?12:0}}/>
            {sq.length>0&&filtered.length===0&&<div style={{fontSize:13,color:dk.muted,padding:"8px 0",textAlign:"center"}}>No matches. Send me a photo in chat.</div>}
            <div style={{maxHeight:340,overflowY:"auto"}}>
              {filtered.map((p,i)=>{const sel=selP.some(x=>x.common_name===p.n);return(
                <div key={i} onClick={()=>toggleP(p)} style={{padding:"10px 0",borderTop:i>0?`1px solid ${dk.border}`:"none",cursor:"pointer",opacity:sel?0.45:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div><div style={{fontWeight:600,fontSize:14,color:dk.white}}>{p.n}</div><div style={{fontSize:11,color:dk.muted,fontStyle:"italic"}}>{p.s}</div></div>
                    <div style={{width:22,height:22,borderRadius:11,border:sel?"none":`2px solid ${dk.border}`,background:sel?dk.teal:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:dk.bg,fontSize:13,flexShrink:0}}>{sel?"✓":""}</div>
                  </div>
                  <div style={{marginTop:6}}>
                    <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#78350F",color:"#FCD34D",marginRight:4}}>🌡️ {p.mn}–{p.mx}°F</span>
                    <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#1E3A5F",color:"#93C5FD",marginRight:4}}>💨 ≤{p.w} mph</span>
                    {p.r?<span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#312E81",color:"#A5B4FC",marginRight:4}}>🌧️ sensitive</span>:null}
                    {p.d?<span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#1A2E1A",color:"#86EFAC"}}>💧 drought tolerant</span>:null}
                  </div>
                  <div style={{fontSize:11,color:dk.muted,marginTop:4}}>{p.t}</div>
                </div>);})}
            </div>
          </div>

          {selP.length>0&&<>
            <div style={cs}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:6}}>GROUP NAME</div>
              <input type="text" value={gName} onChange={e=>{setGName(e.target.value.slice(0,60));setGroupNameError("");}} placeholder={`Patio Group ${groups.length+1}`} maxLength={60}
                style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${groupNameError?dk.red:dk.border}`,fontSize:14,background:dk.bg,color:dk.white,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
            {groupNameError&&<div style={{fontSize:11,color:dk.red,marginTop:6}}>{groupNameError}</div>}
            </div>
            <div style={cs}>
              <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:12}}>TOLERANCE ADJUSTMENTS</div>
              <div style={{fontSize:11,color:dk.muted,marginBottom:12,lineHeight:1.5}}>Your plants handle more than the textbook says? Adjust here.</div>
              {[{label:"🌡️ Heat",value:heatAdj,set:setHeatAdj,unit:"°F",color:"#F87171"},{label:"❄️ Cold",value:coldAdj,set:setColdAdj,unit:"°F",color:"#7AB8F5"},{label:"💨 Wind",value:windAdj,set:setWindAdj,unit:" mph",color:"#BFA0E8"}].map(({label,value,set,unit,color})=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:12,color:dk.mutedLight}}>{label}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>set(v=>Math.max(0,v-5))} style={{width:28,height:28,borderRadius:6,background:dk.bg,border:`1px solid ${dk.border}`,color:dk.white,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                    <div style={{fontSize:14,fontWeight:700,color:value>0?color:dk.muted,minWidth:50,textAlign:"center"}}>{value>0?`+${value}${unit}`:"—"}</div>
                    <button onClick={()=>set(v=>v+5)} style={{width:28,height:28,borderRadius:6,background:dk.bg,border:`1px solid ${dk.border}`,color:dk.white,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                  </div>
                </div>
              ))}
            </div>
            <button onClick={saveGroup} style={{width:"100%",padding:"12px 24px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${dk.gold},${dk.goldDim})`,color:dk.bg,fontSize:15,fontWeight:700,cursor:"pointer"}}>
              {editingGroup?`Update ${selP.length} Plant${selP.length!==1?"s":""}`:`Save & Watch ${selP.length} Plant${selP.length!==1?"s":""}`}
            </button>
          </>}

          <div style={{marginTop:16,background:dk.cardAlt,border:`1px dashed ${dk.border}`,borderRadius:12,padding:16,textAlign:"center",fontSize:12,color:dk.muted,lineHeight:1.5}}>
            📸 <strong style={{color:dk.mutedLight}}>Can't find your plant?</strong><br/>Send me a photo in the chat and I'll identify it.
          </div>
        </>}

        {scr==="set"&&<>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <button onClick={()=>{setScr("home");setErr(null);}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:dk.gold,padding:4}}>←</button>
            <div style={hd}>Settings</div>
          </div>
          <div style={cs}>
            <div style={{...eyebrow,marginBottom:8}}>LOCATION</div>
            <div style={{fontSize:13,color:"var(--ink-2)"}}>{savedZip?`Zip: ${savedZip}`:"Leander, TX"}</div>
          </div>
          <div style={cs}>
            <div style={{...eyebrow,marginBottom:10}}>THEME</div>
            <div style={{display:"flex",gap:8}}>
              {[{k:"dark",label:"Dark"},{k:"notebook",label:"Notebook"},{k:"cotton-candy",label:"Cotton Candy"}].map(t=>(
                <button key={t.k} onClick={()=>setTheme(t.k)}
                  style={{flex:1,padding:"10px 6px",borderRadius:6,cursor:"pointer",
                    fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:"0.08em",
                    border:`1px solid ${theme===t.k?"var(--amber)":"var(--line)"}`,
                    background:theme===t.k?"var(--panel-2)":"transparent",
                    color:theme===t.k?"var(--amber)":"var(--ink-3)",fontWeight:theme===t.k?700:500}}>
                  {t.label}
                </button>
              ))}
            </div>
          </div>
          <div style={cs}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:8}}>TESTING</div>
            <div style={{fontSize:12,color:dk.muted,marginBottom:12,lineHeight:1.6}}>Forces extreme weather conditions so all alerts fire. Turn off when done testing.</div>
            <button onClick={()=>{setTestMode(t=>!t);setDismissed({});setAlertAckedDate("");}}
              style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px solid ${testMode?"#F87171":dk.border}`,background:testMode?"#7F1D1D":"transparent",color:testMode?"#FCA5A5":dk.muted,fontSize:14,fontWeight:700,cursor:"pointer"}}>
              {testMode?"⚠️ Test mode ON — tap to disable":"Test mode off"}
            </button>
          </div>
          <div style={cs}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:8}}>HEAT THRESHOLD</div>
            <div style={{fontSize:12,color:dk.muted,marginBottom:12,lineHeight:1.6}}>The temperature that counts as an extreme-heat day for your area. The season tracker counts days at or above this.</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontSize:13,color:dk.mutedLight}}>🌡️ Extreme heat at</span>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <button onClick={()=>setHeatThreshold(t=>Math.max(80,t-5))}
                  style={{width:32,height:32,borderRadius:8,background:dk.bg,border:`1px solid ${dk.border}`,color:dk.white,fontSize:18,cursor:"pointer"}}>−</button>
                <span style={{fontSize:16,fontWeight:800,color:dk.red,minWidth:54,textAlign:"center"}}>{heatThreshold}°F</span>
                <button onClick={()=>setHeatThreshold(t=>Math.min(120,t+5))}
                  style={{width:32,height:32,borderRadius:8,background:dk.bg,border:`1px solid ${dk.border}`,color:dk.white,fontSize:18,cursor:"pointer"}}>+</button>
              </div>
            </div>
          </div>
          <div style={cs}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:8}}>NOTIFICATIONS</div>
            <div style={{fontSize:12,color:dk.muted,marginBottom:12,lineHeight:1.6}}>Daily weather alerts sent to your device even when the app is closed. Requires adding the app to your home screen on iOS.</div>
            {pushEnabled?(
              <button onClick={unregisterPush} style={{width:"100%",padding:"12px",borderRadius:10,background:"transparent",color:dk.muted,border:`1.5px solid ${dk.border}`,fontSize:14,fontWeight:600,cursor:"pointer"}}>
                🔔 Notifications on — tap to disable
              </button>
            ):(
              <button onClick={registerPush} disabled={pushPending} style={{width:"100%",padding:"12px",borderRadius:10,background:`linear-gradient(135deg,${dk.teal},${dk.tealDim})`,color:dk.bg,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",opacity:pushPending?0.6:1}}>
                {pushPending?"Setting up…":"Enable notifications"}
              </button>
            )}
          </div>
          <div style={cs}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:8}}>DATA</div>
            <button onClick={()=>{if(confirm("Delete all plants?")){setGroups([]);setDismissed({});setActionLog([]);setWateringLog([]);}}}
              style={{width:"100%",padding:"12px 24px",borderRadius:10,background:"transparent",color:dk.red,border:`1.5px solid ${dk.red}`,fontSize:14,fontWeight:600,cursor:"pointer"}}>Delete All Plants</button>
          </div>
        </>}
      </div>

      {detailPlant&&(
        <div onClick={()=>setDetailPlant(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:20,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:dk.card,borderRadius:"16px 16px 0 0",padding:"20px 18px 32px",width:"100%",maxWidth:480,border:`1px solid ${dk.border}`,borderBottom:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div><div style={{fontSize:18,fontWeight:700,color:dk.white}}>{detailPlant.common_name}</div><div style={{fontSize:13,color:dk.muted,fontStyle:"italic"}}>{detailPlant.scientific_name}</div></div>
              <button onClick={()=>setDetailPlant(null)} style={{background:"none",border:"none",fontSize:18,color:dk.muted,cursor:"pointer",padding:4}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1,padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                  <div style={{fontSize:10,color:dk.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Temperature</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#F87171"}}>🌡️ {detailPlant.min_temp_f}° – {detailPlant.max_temp_f}°F</div>
                </div>
                <div style={{flex:1,padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                  <div style={{fontSize:10,color:dk.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Wind</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#BFA0E8"}}>💨 ≤ {detailPlant.max_wind_mph} mph</div>
                </div>
              </div>
              <div style={{padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                <div style={{fontSize:10,color:dk.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Rain Sensitivity</div>
                <div style={{fontSize:14,fontWeight:700,color:detailPlant.rain_sensitive?"#7AB8F5":dk.teal}}>{detailPlant.rain_sensitive?"🌧️ Sensitive — cover or shelter":"✓ Handles rain fine"}</div>
              </div>
              {(detailPlant.drought_tolerant||DROUGHT_NAMES.has(detailPlant.common_name))&&(
                <div style={{padding:"10px 12px",borderRadius:10,background:"#0F1F0F",border:`1px solid #1A3A1A`}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#86EFAC"}}>💧 Drought tolerant — skip early watering</div>
                </div>
              )}
              {detailPlant.notes&&<div style={{padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                <div style={{fontSize:10,color:dk.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Notes</div>
                <div style={{fontSize:13,color:dk.mutedLight,lineHeight:1.5}}>{detailPlant.notes}</div>
              </div>}
            </div>
          </div>
        </div>
      )}

      {alertModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:30,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
          <div style={{background:dk.card,borderRadius:16,padding:"24px 20px",width:"100%",maxWidth:400,border:`1px solid ${dk.border}`}}>
            <div style={{fontSize:16,fontWeight:700,color:dk.white,marginBottom:16}}>Heads up 🌿</div>
            {alertModal.map((m,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:12,padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                <div style={{fontSize:18,flexShrink:0}}>{m.icon}</div>
                <div style={{fontSize:13,color:dk.mutedLight,lineHeight:1.5}}>{m.text}</div>
              </div>
            ))}
            <button onClick={dismissAlertModal}
              style={{width:"100%",marginTop:4,padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${dk.gold},${dk.goldDim})`,color:dk.bg,fontSize:15,fontWeight:700,cursor:"pointer"}}>
              Got it
            </button>
          </div>
        </div>
      )}

      {showWaterModal&&(
        <div onClick={()=>setShowWaterModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:20,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:dk.card,borderRadius:"16px 16px 0 0",padding:"20px 18px 32px",width:"100%",maxWidth:480,border:`1px solid ${dk.border}`,borderBottom:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:700,color:dk.white}}>💧 Log Watering</div>
              <button onClick={()=>setShowWaterModal(false)} style={{background:"none",border:"none",fontSize:18,color:dk.muted,cursor:"pointer",padding:4}}>✕</button>
            </div>
            {waterInfo?.earlyTrigger&&(
              <div style={{padding:"8px 12px",borderRadius:8,background:"#2A1A08",border:`1px solid ${dk.gold}44`,fontSize:12,color:dk.gold,marginBottom:14}}>
                🌡️ {getConsecHeatDays(timeline)} consecutive heat alert days — watering early (day {waterInfo.interval} of 7). Next reminder will be 7 days from today.
              </div>
            )}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:6}}>NOTES</div>
            <textarea
              value={waterNotes}
              onChange={e=>setWaterNotes(e.target.value.slice(0,500))}
              rows={3}
              placeholder="e.g. skipped snake plant and pothos"
              style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${dk.border}`,fontSize:13,background:dk.bg,color:dk.white,outline:"none",fontFamily:"inherit",boxSizing:"border-box",resize:"none",lineHeight:1.5}}
            />
            <button onClick={logWatering}
              style={{width:"100%",marginTop:12,padding:"13px 24px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${dk.teal},${dk.tealDim})`,color:dk.bg,fontSize:15,fontWeight:700,cursor:"pointer"}}>
              Mark as watered today
            </button>
          </div>
        </div>
      )}
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
