function bTL(groups, wx) {
  if (!wx || !groups.length) return [];
  const d = wx.daily, days = [];
  for (let i = 0; i < d.time.length; i++) {
    const dt = new Date(d.time[i]+"T12:00:00"), hi = d.temperature_2m_max[i], lo = d.temperature_2m_min[i], wi = d.wind_speed_10m_max[i], ra = d.precipitation_sum[i], iss = [];
    for (const g of groups) { const ha=g.heatAdj||0, ca=g.coldAdj||0, wa=g.windAdj||0;
      for (const p of g.plants) { if (p.indoors) continue; const emx=p.max_temp_f+ha, emn=p.min_temp_f-ca, ew=p.max_wind_mph+wa;

        if (lo<emn) iss.push({plant:p.common_name,type:"cold",icon:"❄️"});
        if (wi>ew) iss.push({plant:p.common_name,type:"wind",icon:"💨"});
        if (p.rain_sensitive&&ra>0.1) iss.push({plant:p.common_name,type:"rain",icon:"🌧️"});
      }
    }
    days.push({date:d.time[i],dayName:i===0?"Today":i===1?"Tmrw":DN[dt.getDay()].slice(0,3),dateLabel:`${MN[dt.getMonth()]} ${dt.getDate()}`,high:hi,low:lo,wind:wi,rain:ra,wc:d.weathercode[i],issues:iss,rainCollect:ra>0.1});
  }
  return days;
}

function gPS(name,tl,dis) {
  if (!tl.length) return "ok";
  const t=tl[0], iss=t.issues.filter(i=>i.plant===name&&i.type!=="rain");
  if (!iss.length) return "ok";
  const types=[...new Set(iss.map(i=>i.type))];
  if (types.every(t2=>dis[`${t.date}-${t2}`])) return "resolved";
  return iss[0].type;
}

function getConsecHeatDays(tl) {
  let n = 0;
  for (const day of tl) { if (day.issues.some(i=>i.type==="heat")) n++; else break; }

}

// ── Security helpers ─────────────────────────────────────────────
const sanitize = (str, maxLen=200) => {
  if (typeof str !== "string") return "";
  return str.replace(/[<>&"'`]/g, "").slice(0, maxLen).trim();
};
const safeInt = (val, fallback=0, min=-50, max=200) => {
  const n = Number(val);
  return isFinite(n) ? Math.min(max, Math.max(min, n)) : fallback;
};
const validateGroup = (g) => {
  if (!g || typeof g !== "object") return null;
  if (typeof g.id !== "string" && typeof g.id !== "number") return null;
  return {
    id: String(g.id).slice(0, 40),
    name: sanitize(g.name || "My Plants", 60),
    plants: Array.isArray(g.plants) ? g.plants.slice(0, 200).map(validatePlant).filter(Boolean) : [],
    heatAdj: safeInt(g.heatAdj, 0, 0, 30),
    coldAdj: safeInt(g.coldAdj, 0, 0, 30),
    windAdj: safeInt(g.windAdj, 0, 0, 20),
    addedAt: typeof g.addedAt === "string" ? g.addedAt.slice(0, 30) : new Date().toISOString(),
  };
};
const validatePlant = (p) => {
  if (!p || typeof p !== "object") return null;
  if (typeof p.common_name !== "string" || !p.common_name.trim()) return null;
  return {
    common_name: sanitize(p.common_name, 80),
    scientific_name: sanitize(p.scientific_name || "", 80),
    min_temp_f: safeInt(p.min_temp_f, 50, -20, 100),
    max_temp_f: safeInt(p.max_temp_f, 95, 40, 130),
    max_wind_mph: safeInt(p.max_wind_mph, 20, 0, 80),
    rain_sensitive: !!p.rain_sensitive,
    drought_tolerant: !!p.drought_tolerant,
    notes: sanitize(p.notes || "", 300),
    indoors: !!p.indoors,
  };
};
const validateStoredData = (raw) => {
  try {
    const d = typeof raw === "string" ? JSON.parse(raw) : raw;
    if (!d || typeof d !== "object") return null;
    return {
      groups: Array.isArray(d.groups) ? d.groups.slice(0, 20).map(validateGroup).filter(Boolean) : [],
      zip: typeof d.zip === "string" ? d.zip.replace(/\D/g,"").slice(0,5) : "78641",
      loc: (d.loc && isFinite(d.loc.lat) && isFinite(d.loc.lon)) ? { lat: Number(d.loc.lat), lon: Number(d.loc.lon) } : null,
      dismissed: (d.dismissed && typeof d.dismissed === "object") ? d.dismissed : {},
      actionLog: Array.isArray(d.actionLog) ? d.actionLog.slice(-500) : [],
      wateringLog: Array.isArray(d.wateringLog) ? d.wateringLog.slice(-200) : [],
      alertAckedDate: typeof d.alertAckedDate === "string" ? d.alertAckedDate.slice(0,10) : "",
    };
  } catch { return null; }
};

        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== "granted") { setPushPending(false); return; }

      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
        });
      }
      const res = await fetch(`${WORKER_URL}/subscribe`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(sub.toJSON()),
      });
      if (res.ok) {
        setPushEnabled(true);
        window.storage.set("pg-push", "enabled").catch(()=>{});
      }
    } catch (e) {
      console.error("Push registration failed:", e);
    } finally {
      setPushPending(false);
    }
  };

  const unregisterPush = async () => {
    try {
      const reg = await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        await fetch(`${WORKER_URL}/subscribe`, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ endpoint: sub.endpoint }),
        });
        await sub.unsubscribe();
      }
      setPushEnabled(false);
      window.storage.delete("pg-push").catch(()=>{});
    } catch (e) {
      console.error("Unsubscribe failed:", e);

            ):(
              <button onClick={registerPush} disabled={pushPending} style={{width:"100%",padding:"12px",borderRadius:10,background:`linear-gradient(135deg,${dk.teal},${dk.tealDim})`,color:dk.bg,border:"none",fontSize:14,fontWeight:700,cursor:"pointer",opacity:pushPending?0.6:1}}>
                {pushPending?"Setting up…":"Enable notifications"}
              </button>
            )}
          </div>
          <div style={cs}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:8}}>DATA</div>
            <button onClick={()=>{if(confirm("Delete all plants?")){setGroups([]);setDismissed({});setActionLog([]);setWateringLog([]);}}}
              style={{width:"100%",padding:"12px 24px",borderRadius:10,background:"transparent",color:dk.red,border:`1.5px solid ${dk.red}`,fontSize:14,fontWeight:600,cursor:"pointer"}}>Delete All Plants</button>
          </div>
        </>}
      </div>

      {detailPlant&&(
        <div onClick={()=>setDetailPlant(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:20,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:dk.card,borderRadius:"16px 16px 0 0",padding:"20px 18px 32px",width:"100%",maxWidth:480,border:`1px solid ${dk.border}`,borderBottom:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div><div style={{fontSize:18,fontWeight:700,color:dk.white}}>{detailPlant.common_name}</div><div style={{fontSize:13,color:dk.muted,fontStyle:"italic"}}>{detailPlant.scientific_name}</div></div>
              <button onClick={()=>setDetailPlant(null)} style={{background:"none",border:"none",fontSize:18,color:dk.muted,cursor:"pointer",padding:4}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1,padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                  <div style={{fontSize:10,color:dk.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Temperature</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#F87171"}}>🌡️ {detailPlant.min_temp_f}° – {detailPlant.max_temp_f}°F</div>
                </div>
                <div style={{flex:1,padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                  <div style={{fontSize:10,color:dk.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Wind</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#BFA0E8"}}>💨 ≤ {detailPlant.max_wind_mph} mph</div>
                </div>
              </div>
              <div style={{padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                <div style={{fontSize:10,color:dk.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Rain Sensitivity</div>
                <div style={{fontSize:14,fontWeight:700,color:detailPlant.rain_sensitive?"#7AB8F5":dk.teal}}>{detailPlant.rain_sensitive?"🌧️ Sensitive — cover or shelter":"✓ Handles rain fine"}</div>
              </div>
              {(detailPlant.drought_tolerant||DROUGHT_NAMES.has(detailPlant.common_name))&&(
                <div style={{padding:"10px 12px",borderRadius:10,background:"#0F1F0F",border:`1px solid #1A3A1A`}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#86EFAC"}}>💧 Drought tolerant — skip early watering</div>
                </div>
              )}
              {detailPlant.notes&&<div style={{padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                <div style={{fontSize:10,color:dk.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Notes</div>
                <div style={{fontSize:13,color:dk.mutedLight,lineHeight:1.5}}>{detailPlant.notes}</div>
              </div>}
            </div>
          </div>
        </div>
      )}

      {alertModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:30,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}}>
          <div style={{background:dk.card,borderRadius:16,padding:"24px 20px",width:"100%",maxWidth:400,border:`1px solid ${dk.border}`}}>
            <div style={{fontSize:16,fontWeight:700,color:dk.white,marginBottom:16}}>Heads up 🌿</div>
            {alertModal.map((m,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:12,padding:"10px 12px",borderRadius:10,background:dk.bg,border:`1px solid ${dk.border}`}}>
                <div style={{fontSize:18,flexShrink:0}}>{m.icon}</div>
                <div style={{fontSize:13,color:dk.mutedLight,lineHeight:1.5}}>{m.text}</div>
              </div>
            ))}
            <button onClick={dismissAlertModal}
              style={{width:"100%",marginTop:4,padding:"12px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${dk.gold},${dk.goldDim})`,color:dk.bg,fontSize:15,fontWeight:700,cursor:"pointer"}}>
              Got it
            </button>
          </div>
        </div>
      )}

      {showWaterModal&&(
        <div onClick={()=>setShowWaterModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:20,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:dk.card,borderRadius:"16px 16px 0 0",padding:"20px 18px 32px",width:"100%",maxWidth:480,border:`1px solid ${dk.border}`,borderBottom:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:18,fontWeight:700,color:dk.white}}>💧 Log Watering</div>
              <button onClick={()=>setShowWaterModal(false)} style={{background:"none",border:"none",fontSize:18,color:dk.muted,cursor:"pointer",padding:4}}>✕</button>
            </div>
            {waterInfo?.earlyTrigger&&(
              <div style={{padding:"8px 12px",borderRadius:8,background:"#2A1A08",border:`1px solid ${dk.gold}44`,fontSize:12,color:dk.gold,marginBottom:14}}>
                🌡️ {getConsecHeatDays(timeline)} consecutive heat alert days — watering early (day {waterInfo.interval} of 7). Next reminder will be 7 days from today.
              </div>
            )}
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",color:dk.gold,marginBottom:6}}>NOTES</div>
            <textarea
              value={waterNotes}
              onChange={e=>setWaterNotes(e.target.value.slice(0,500))}
              rows={3}
              placeholder="Which plants did you skip? Any observations..."
              style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${dk.border}`,fontSize:13,background:dk.bg,color:dk.white,outline:"none",fontFamily:"inherit",boxSizing:"border-box",resize:"none",lineHeight:1.5}}
            />
            <button onClick={logWatering}
              style={{width:"100%",marginTop:12,padding:"13px 24px",borderRadius:10,border:"none",background:`linear-gradient(135deg,${dk.teal},${dk.tealDim})`,color:dk.bg,fontSize:15,fontWeight:700,cursor:"pointer"}}>
              Mark as watered today
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
  </script>
</body>
</html>
