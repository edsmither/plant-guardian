  get:(k)=>Promise.resolve(localStorage.getItem(k)?{key:k,value:localStorage.getItem(k)}:null),
  set:(k,v)=>{localStorage.setItem(k,v);return Promise.resolve({key:k,value:v});},
  delete:(k)=>{localStorage.removeItem(k);return Promise.resolve({key:k,deleted:true});},

};

function bTL(groups,wx){
  if(!wx||!groups.length)return[];
  const d=wx.daily,days=[];
  for(let i=0;i<d.time.length;i++){
    const dt=new Date(d.time[i]+"T12:00:00"),hi=d.temperature_2m_max[i],lo=d.temperature_2m_min[i],wi=d.wind_speed_10m_max[i],ra=d.precipitation_sum[i],iss=[];
    for(const g of groups){const ha=g.heatAdj||0,ca=g.coldAdj||0,wa=g.windAdj||0;
      for(const p of g.plants){if(p.indoors)continue;
        if(hi>p.max_temp_f+ha)iss.push({plant:p.common_name,type:"heat"});
        if(lo<p.min_temp_f-ca)iss.push({plant:p.common_name,type:"cold"});
        if(wi>p.max_wind_mph+wa)iss.push({plant:p.common_name,type:"wind"});
      }
    }
    const abbr=i===0?"TODAY":i===1?"TMRW":DN[dt.getDay()].toUpperCase().slice(0,3);
    days.push({date:d.time[i],dayAbbr:abbr,dateLabel:`${MN[dt.getMonth()].toUpperCase()} ${dt.getDate()}`,high:hi,low:lo,wind:wi,rain:ra,wc:d.weathercode[i],issues:iss,rainCollect:ra>0.1});
  }
  return days;
}

// ── Twin tick-chart: two horizontal segment rows ────────────────
// CRITICAL ALIGNMENT: the segment strip must use the SAME flex
// layout as the 7-day cells row above it (display:flex, gap:CELL_GAP,
// every child flex:"1 0 0"). The HEAT/RAIN labels sit ABOVE their
// strips, NOT beside them, so they steal zero horizontal space —
// segment N then sits exactly under day cell N.
const CELL_GAP=4; // gap between day cells AND tick segments — must match

function TickChart({timeline,heatThreshold=95}){
  if(!timeline||!timeline.length)return null;
  const rows=[
    {label:"HOT",color:"var(--amber)",segs:timeline.map(d=>({on:d.high>=heatThreshold,hasData:d.high>0}))},
    {label:"RAIN",color:"var(--mint)",segs:timeline.map(d=>({on:d.rainCollect,hasData:d.rain>0}))},
  ];
  return(
    <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid var(--line)"}}>
      {rows.map(row=>(
        <div key={row.label} style={{marginBottom:7}}>
          {/* Label on its own line above — zero effect on strip width */}
          <div className="mt" style={{color:"var(--ink-3)",fontSize:8,letterSpacing:".2em",marginBottom:4}}>{row.label}</div>
          {/* Strip: identical flex layout to the day-cells row */}
          <div style={{display:"flex",gap:CELL_GAP}}>
            {row.segs.map((seg,i)=>(
              <div key={i} style={{flex:"1 0 0",minWidth:0,height:8,borderRadius:2,background:row.color,opacity:!seg.hasData?0:seg.on?0.88:0.2}}/>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

function Donut({pct,color,centerText,sub,label}){
  const r=72,circ=2*Math.PI*r,dash=Math.max(0,Math.min(1,pct))*circ;
  const pctNum=Math.round(pct*100);
  return<div style={{textAlign:"center",flex:1}}>
    <div className="eb" style={{color:"var(--ink-3)",letterSpacing:".18em",marginBottom:6}}>{label}</div>
    <svg width="184" height="184" viewBox="0 0 184 184" style={{maxWidth:"100%"}}>

      <circle cx="92" cy="92" r="72" fill="none" stroke={color} strokeWidth="16" strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform="rotate(-90 92 92)"/>
      <text x="92" y="101" textAnchor="middle" fontSize="42" fontWeight="800" fill={color} fontFamily="'Barlow Condensed',sans-serif" style={{fontVariantNumeric:"tabular-nums"}}>{pctNum}%</text>

  </div>;
}

            </div>

            {/* ── 01 TODAY ──────────────────────────────────── */}

              const open=hasAlerts&&!snoozed;

              const extraColor=open?"var(--alert)":snoozed?"var(--warn)":"var(--mint)";
              const titleText=open?"Active Alerts":snoozed?"Alerts Snoozed":todayR?"Rainwater Day":"No Alerts Today";
              return(
                <div ref={refToday} className="card">
                  <SectionHead num="01" label="TODAY" extra={extra} extraColor={extraColor} right={todayDateStr} title={titleText} isCollapsed={collapsed.today} onToggle={()=>toggleSection("today")}/>
                  {!collapsed.today&&(
                    <div style={{padding:"0 14px 14px"}}>
                      {todayR&&(
                        <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,background:"rgba(91,227,168,0.07)",border:"1px solid rgba(91,227,168,0.2)",marginBottom:10}}>
                          <svg width="12" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--mint)" strokeWidth="2.2" strokeLinecap="round"><path d="M12 2C6 12 6 16 12 22c6-6 6-10 0-20z"/></svg>
                          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:".08em",color:"var(--mint)"}}>Collect rainwater — {timeline[0].rain.toFixed(1)}" expected</span>
                        </div>
                      )}

                      {hasAlerts&&(
                        <div style={{marginBottom:10,opacity:snoozed?0.6:1}}>
                          {/* Alert card — always shows plant list, no tap required */}
                          <div style={{padding:"11px 12px",borderRadius:8,
                            background:snoozed?"rgba(255,255,255,0.02)":"rgba(255,106,77,0.08)",
                            border:`1px solid ${snoozed?"var(--line)":"rgba(255,106,77,0.25)"}`}}>
                            {/* Condition icon + description */}
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={snoozed?"var(--ink-3)":"var(--alert)"} strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><path d="M10.3 3.2 1.8 17.5A2 2 0 0 0 3.5 20.5h17A2 2 0 0 0 22.2 17.5L13.7 3.2a2 2 0 0 0-3.4 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17"/></svg>
                              <span className="eb" style={{color:snoozed?"var(--ink-3)":"var(--alert)",fontSize:9,letterSpacing:".16em"}}>{activeTypes.map(t=>ACFG[t].desc).join(" · ")}</span>
                            </div>
                            {/* Plant list — always visible, low opacity alert tint */}
                            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                              {allPlants.map(pname=>(
                                <span key={pname} onClick={()=>{const g=getPlantGroup(pname);const pl=g?.plants.find(x=>x.common_name===pname);if(pl)setDetailPlant(pl);}}
                                  style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",
                                    color:snoozed?"var(--ink-3)":"rgba(255,106,77,0.85)",cursor:"pointer",
                                    padding:"2px 8px",borderRadius:6,
                                    background:snoozed?"rgba(255,255,255,0.03)":"rgba(255,106,77,0.08)"}}>
                                  {pname}
                                </span>
                              ))}
                            </div>
                          </div>

                          {/* Snooze toggle — tap to snooze, tap again to wake */}
                          <button onClick={()=>snoozed?unsnoozeAlert(td,"all"):resolveAlert(td,"all",allPlants,"snoozed")}
                            style={{width:"100%",marginTop:5,padding:"8px 12px",borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,outline:"none",
                              background:snoozed?"rgba(240,196,58,0.08)":"transparent",
                              border:snoozed?"1px solid rgba(240,196,58,0.35)":"1px dashed var(--line-2)"}}>
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={snoozed?"var(--warn)":"var(--ink-3)"} strokeWidth="2" strokeLinecap="round">
                              {snoozed
                                ?<><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></>
                                :<><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 6v6l4 2"/><path d="M2 2l3 3m-3 7h4"/></>
                              }
                            </svg>
                            <span className="eb" style={{color:snoozed?"var(--warn)":"var(--ink-3)",fontSize:9,letterSpacing:".18em"}}>
                              {snoozed?"SNOOZED · TAP TO WAKE":"SNOOZE · REMIND TOMORROW"}
                            </span>
                          </button>
                        </div>
                      )}

                      {!todayR&&!hasAlerts&&<div style={{fontSize:13,color:"var(--ink-3)"}}>No weather alerts for today.</div>}
                    </div>
                  )}
                </div>
              );
            })()}

            {/* ── 02 UPCOMING ───────────────────────────────── */}
            {upcomingAlertDays.length>0&&(
              <div className="card">
                <SectionHead num="02" label="UPCOMING" extra={`${upcomingAlertDays.length} DAYS`}
                  right={upcomingRainCount>0?`RAIN ×${upcomingRainCount}`:undefined} rightColor="var(--steel)"
                  title="Plants to Watch" isCollapsed={collapsed.upcoming} onToggle={()=>toggleSection("upcoming")}/>
                {!collapsed.upcoming&&(
                  <div style={{padding:"0 14px 14px"}}>
                    {upcomingAlertDays.map((day,idx)=>{
                      const di=day.issues.filter(i=>i.type!=="rain");
                      const typeSet=[...new Set(di.map(i=>i.type))],plants=[...new Set(di.map(i=>i.plant))],n=di.length;
                      const domType=["cold","heat","wind"].find(t=>typeSet.includes(t))||typeSet[0];
                      const tColors={heat:"var(--alert)",cold:"var(--steel)",wind:"var(--amber)"};
                      return(
                        <div key={day.date} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderTop:idx>0?"1px dashed var(--line)":"none"}}>
                          <div style={{width:56,flexShrink:0}}>
                            <div className="da">{day.dayAbbr}</div>
                            <div className="ds">{day.dateLabel}</div>
                          </div>
                          <div style={{width:26,flexShrink:0,display:"flex",justifyContent:"center"}}>
                            <WxIcon code={day.wc} size={20}/>
                          </div>
                          <div style={{flex:1,fontSize:13,color:"var(--ink-2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}}>
                            {plants.join(", ")}

                          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,color:tColors[domType]||"var(--ink-3)",flexShrink:0,letterSpacing:".04em"}}>×{n}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* ── 03 OUTLOOK ────────────────────────────────── */}
            <div ref={refOutlook} className="card">
              <SectionHead num="03" label="OUTLOOK"
                right={wxTime?`UPDATED ${fmtTime(wxTime)}`:undefined} rightColor="var(--mint)"

              {!collapsed.outlook&&(
                <div style={{padding:"0 14px 14px"}}>
                  {/* Day cells — identical flex layout to TickChart strip below */}
                  <div style={{display:"flex",gap:CELL_GAP}}>
                    {timeline.map((day,i)=>{
                      const di=day.issues.filter(x=>x.type!=="rain"),ha=di.length>0,it=i===0;
                      return(
                        <div key={day.date} style={{flex:"1 0 0",minWidth:0,textAlign:"center",padding:"7px 3px 6px",borderRadius:7,background:it?"var(--panel-2)":"transparent",border:it?"1px solid var(--mint)":"1px solid var(--line)"}}>
                          <div className="oh" style={{color:it?"var(--mint)":"var(--ink-3)",marginBottom:3}}>{day.dayAbbr.slice(0,it?5:3)}</div>
                          <div style={{display:"flex",justifyContent:"center",margin:"3px 0"}}><WxIcon code={day.wc} size={17}/></div>
                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:it?21:17,fontWeight:800,color:"var(--ink)",lineHeight:1.1}}>{Math.round(day.high)}°</div>
                          <div className="eb" style={{fontSize:9,color:"var(--ink-3)",marginTop:1}}>{Math.round(day.low)}°</div>
                          {ha?(
                            <div className="eb" style={{fontSize:8,color:"var(--alert)",marginTop:3,fontWeight:700}}>-{di.length}</div>
                          ):day.rainCollect?(
                            <div style={{marginTop:3,display:"flex",justifyContent:"center"}}>
                              <svg width="7" height="9" viewBox="0 0 24 24" fill="none" stroke="var(--mint)" strokeWidth="2.5" strokeLinecap="round"><path d="M12 2C6 12 6 16 12 22c6-6 6-10 0-20z"/></svg>
                            </div>
                          ):<div style={{height:12}}/>}
                        </div>
                      );
                    })}
                  </div>
                  {/* Tick chart — same gap:CELL_GAP + flex:"1 0 0", segment N under day cell N */}
                  <TickChart timeline={timeline} heatThreshold={heatThreshold}/>
                </div>
              )}
            </div>

            {/* ── 04 SEASON TRACKER ─────────────────────────── */}
            {(()=>{const hp=getHP(),rp=getRP();return(
              <div className="card">
                <SectionHead num="04" label="SEASON" right="MAR 21 → DEC 21" title="Season Tracker" isCollapsed={collapsed.season} onToggle={()=>toggleSection("season")}/>
                {!collapsed.season&&(
                  <div style={{padding:"0 14px 14px"}}>
                    {!climate?(
                      <div className="eb" style={{color:"var(--ink-3)",textAlign:"center",padding:"12px 0",fontSize:9}}>Loading local climate history…</div>
                    ):(
                      <>
                        <div style={{display:"flex",gap:8}}>
                          {hp&&<Donut pct={hp.pct} color="var(--alert)" centerText={`${hp.counted}/${hp.avg}`} sub={`days ≥${heatThreshold}°`} label="Hot Days"/>}
                          {rp&&<Donut pct={rp.pct} color="var(--steel)" centerText={`${rp.counted}/${rp.avg}`} sub={`rain days ≥0.1"`} label="Rain Days"/>}
                        </div>
                        <div style={{fontSize:11,color:"var(--ink-3)",marginTop:10,lineHeight:1.5,textAlign:"center"}}>{`Based on ${climate.yearsSampled}-year local average.${hp&&hp.remaining>0?` ~${hp.remaining} hot days still ahead.`:""}`}</div>
                      </>
                    )}
                  </div>
                )}
              </div>
            );})()}

            {/* ── 05 YOUR PLANTS ────────────────────────────── */}
            <div ref={refPlants} className="card">
              <SectionHead num="05" label="INVENTORY" title="Your Plants" isCollapsed={collapsed.plants} onToggle={()=>toggleSection("plants")}/>
              {!collapsed.plants&&(
                <div style={{padding:"0 14px 14px"}}>
                  <button onClick={e=>{e.stopPropagation();setScr("groups");}}
                    style={{width:"100%",padding:"8px 12px",marginBottom:10,borderRadius:4,fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:"var(--ink-2)",background:"none",border:"1px dashed var(--line-2)",cursor:"pointer"}}>
                    Manage Groups →
                  </button>
                  {/* Table header */}
                  <div style={{display:"flex",padding:"2px 0 6px",borderBottom:"1px solid var(--line)"}}>
                    {["Plant","Group","Range","Alerts"].map((h,i)=>(
                      <div key={i} className="eb" style={{fontSize:8,color:"var(--ink-3)",flex:i===0?3:i===1?2:i===2?3:1,textAlign:i===3?"right":"left",letterSpacing:".14em"}}>{h}</div>
                    ))}
                  </div>
                  {outP.map((p,i)=>{
                    const ac=actionLog.filter(l=>l.plants.includes(p.common_name)&&l.action!=="back-outside").length;
                    const g=getPlantGroup(p.common_name),hasAdj=g&&(g.heatAdj||g.coldAdj||g.windAdj);
                    const effMax=p.max_temp_f+(g?.heatAdj||0),effMin=p.min_temp_f-(g?.coldAdj||0),effWind=p.max_wind_mph+(g?.windAdj||0);
                    return(
                      <div key={i} onClick={()=>setDetailPlant(p)} style={{display:"flex",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--line)20",cursor:"pointer"}}>
                        <div style={{flex:3,overflow:"hidden",minWidth:0}}>
                          {/* Plant name: Barlow 15px 700 ALL-CAPS */}
                          <span className="inv-name">{p.common_name}</span>
                        </div>
                        <div style={{flex:2,overflow:"hidden",minWidth:0}}>
                          <span className="inv-sec">{g?.name||"—"}</span>
                        </div>
                        <div style={{flex:3,textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                          <span className="inv-sec" style={{color:hasAdj?"var(--amber)":"var(--ink-3)"}}>{effMin}–{effMax}°</span>
                          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={hasAdj?"var(--amber)":"var(--ink-3)"} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
                          <span className="inv-sec" style={{color:hasAdj?"var(--amber)":"var(--ink-3)"}}>{effWind}{hasAdj?" ✎":""}</span>
                        </div>
                        <div style={{flex:1,textAlign:"right"}}>
                          <span className="inv-sec" style={{fontWeight:700,color:ac>0?"var(--amber)":"var(--ink-3)"}}>{ac||"—"}</span>
                        </div>
                      </div>
                    );
                  })}
                  {inP.length>0&&(
                    <div style={{marginTop:10}}>
                      <div className="eb" style={{color:"var(--amber)",marginBottom:6,fontSize:9}}>🏠 INDOORS</div>
                      {inP.map((p,i)=>{const ac=actionLog.filter(l=>l.plants.includes(p.common_name)&&l.action!=="back-outside").length;const g=getPlantGroup(p.common_name);return(
                        <div key={i} onClick={()=>markBack(p.common_name)} style={{display:"flex",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--line)20",cursor:"pointer"}}>
                          <div style={{flex:3,overflow:"hidden",minWidth:0}}>
                            <span className="inv-name" style={{color:"var(--amber)"}}>↩ {p.common_name}</span>
                          </div>
                          <div style={{flex:2,overflow:"hidden",minWidth:0}}>
                            <span className="inv-sec">{g?.name||"—"}</span>
                          </div>
                          <div style={{flex:3,textAlign:"center"}}>
                            <span className="inv-sec">{p.min_temp_f}–{p.max_temp_f}°</span>
                          </div>
                          <div style={{flex:1,textAlign:"right"}}>
                            <span className="inv-sec" style={{fontWeight:700,color:ac>0?"var(--amber)":"var(--ink-3)"}}>{ac||"—"}</span>
                          </div>
                        </div>
                      );})}
                    </div>
                  )}
                </div>
              )}
            </div>
          </>
        )}
      </>}

      {/* FLOATING ADD BUTTON — classic round FAB, home screen only */}
      {scr==="home"&&groups.length>0&&(
        <button
          onClick={()=>{setScr("add");setSelP([]);setGName("");setSq("");setEditingGroup(null);setHeatAdj(0);setColdAdj(0);setWindAdj(0);}}
          aria-label="Add plants"
          style={{position:"fixed",bottom:24,right:"max(24px, calc(50vw - 240px + 24px))",zIndex:15,
            width:56,height:56,borderRadius:28,border:"none",cursor:"pointer",
            background:"linear-gradient(135deg,var(--amber),var(--warn))",
            color:"var(--bg)",fontSize:30,fontWeight:600,lineHeight:1,
            display:"flex",alignItems:"center",justifyContent:"center",
            boxShadow:"0 4px 16px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06)"}}>
          <span style={{marginTop:-2}}>+</span>
        </button>
      )}

      {/* GROUPS */}
      {scr==="groups"&&<>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><button onClick={()=>setScr("home")} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--amber)",padding:4}}>←</button><div className="st" style={{marginBottom:0}}>Manage Groups</div></div>
        {groups.length===0&&<div className="card" style={{padding:24,textAlign:"center",color:"var(--ink-3)",fontSize:13}}>No groups yet. Tap + to add plants.</div>}
        {groups.map(g=>(
          <div key={g.id} className="card" style={{padding:"14px",cursor:"pointer"}} onClick={()=>{setEditingGroup(g.id);setSelP(g.plants);setGName(g.name);setHeatAdj(g.heatAdj||0);setColdAdj(g.coldAdj||0);setWindAdj(g.windAdj||0);setSq("");setScr("add");}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:14,fontWeight:600,color:"var(--ink)",marginBottom:3}}>{g.name}</div><div style={{fontSize:11,color:"var(--ink-3)"}}>{g.plants.length} plant{g.plants.length!==1?"s":""}{g.plants.filter(p=>p.indoors).length>0?` · ${g.plants.filter(p=>p.indoors).length} indoors`:""}{(g.heatAdj||g.coldAdj||g.windAdj)?<span style={{color:"var(--amber)"}}> · adjusted ✎</span>:null}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:10}}><button onClick={e=>{e.stopPropagation();if(confirm(`Delete "${g.name}"?`)){setGroups(p=>p.filter(x=>x.id!==g.id));};}} style={{background:"none",border:"1px solid var(--alert)44",borderRadius:6,padding:"4px 10px",fontSize:11,color:"var(--alert)",cursor:"pointer"}}>delete</button><div style={{fontSize:12,color:"var(--mint)"}}>edit →</div></div>
            </div>
            <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:4}}>
              {g.plants.slice(0,6).map(p=>(<span key={p.common_name} style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:"var(--bg)",color:p.indoors?"var(--amber)":"var(--ink-2)",border:"1px solid var(--line)"}}>{p.common_name}</span>))}
              {g.plants.length>6&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:10,background:"var(--bg)",color:"var(--ink-3)",border:"1px solid var(--line)"}}>+{g.plants.length-6} more</span>}
            </div>
          </div>
        ))}
        <button onClick={()=>{setScr("add");setSelP([]);setGName("");setSq("");setEditingGroup(null);setHeatAdj(0);setColdAdj(0);setWindAdj(0);}} style={{width:"100%",padding:"12px",borderRadius:10,background:"transparent",color:"var(--amber)",border:"1.5px dashed var(--amber)",fontSize:14,cursor:"pointer",marginTop:4}}>+ New Group</button>
      </>}

      {/* ADD/EDIT */}
      {scr==="add"&&<>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><button onClick={()=>{setScr(editingGroup?"groups":"home");setEditingGroup(null);setHeatAdj(0);setColdAdj(0);setWindAdj(0);setGroupNameError("");}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--amber)",padding:4}}>←</button><div className="st" style={{marginBottom:0}}>{editingGroup?"Edit Group":"Add Plants"}</div></div>
        {selP.length>0&&<div style={{display:"flex",flexWrap:"wrap",marginBottom:12,gap:6}}>{selP.map((p,i)=>(<div key={i} onClick={()=>setSelP(prev=>prev.filter((_,j)=>j!==i))} style={{padding:"6px 10px",borderRadius:8,background:"var(--mint)",cursor:"pointer"}}><div style={{fontSize:11,fontWeight:600,color:"var(--bg)"}}>{p.common_name} ✕</div><div style={{fontSize:9,color:"rgba(0,0,0,0.5)",marginTop:2}}>{p.min_temp_f}–{p.max_temp_f}°F · 💨≤{p.max_wind_mph}mph</div></div>))}</div>}
        <div className="card" style={{padding:"14px"}}>
          <input type="text" value={sq} onChange={e=>setSq(e.target.value.slice(0,100))} placeholder="Search plants..." maxLength={100} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid var(--line)",fontSize:15,background:"var(--bg)",color:"var(--ink)",outline:"none",fontFamily:"inherit",boxSizing:"border-box",marginBottom:filtered.length>0||sq.length>0?12:0}}/>
          {sq.length>0&&filtered.length===0&&<div style={{fontSize:13,color:"var(--ink-3)",padding:"8px 0",textAlign:"center"}}>No matches. Send me a photo in chat.</div>}
          <div style={{maxHeight:340,overflowY:"auto"}}>
            {filtered.map((p,i)=>{const sel=selP.some(x=>x.common_name===p.n);return(
              <div key={i} onClick={()=>toggleP(p)} style={{padding:"10px 0",borderTop:i>0?"1px solid var(--line)":"none",cursor:"pointer",opacity:sel?0.45:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:600,fontSize:14,color:"var(--ink)"}}>{p.n}</div><div style={{fontSize:11,color:"var(--ink-3)",fontStyle:"italic"}}>{p.s}</div></div>
                  <div style={{width:22,height:22,borderRadius:11,border:sel?"none":"2px solid var(--line)",background:sel?"var(--mint)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--bg)",fontSize:13,flexShrink:0}}>{sel?"✓":""}</div>
                </div>
                <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>
                  <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#78350F",color:"#FCD34D"}}>🌡️ {p.mn}–{p.mx}°F</span>
                  <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#1E3A5F",color:"#93C5FD"}}>💨 ≤{p.w}mph</span>
                  {p.r?<span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#312E81",color:"#A5B4FC"}}>🌧️ sensitive</span>:null}
                  {p.d?<span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:"#1A2E1A",color:"#86EFAC"}}>💧 drought tolerant</span>:null}
                </div>

              </div>);})}
          </div>
        </div>
        {selP.length>0&&<>
          <div className="card" style={{padding:"14px"}}><div className="eb" style={{marginBottom:8,color:"var(--amber)",fontSize:9}}>GROUP NAME</div><input type="text" value={gName} onChange={e=>{setGName(e.target.value.slice(0,60));setGroupNameError("");}} placeholder={`Patio Group ${groups.length+1}`} maxLength={60} style={{width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${groupNameError?"var(--alert)":"var(--line)"}`,fontSize:14,background:"var(--bg)",color:"var(--ink)",outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>{groupNameError&&<div style={{fontSize:11,color:"var(--alert)",marginTop:6}}>{groupNameError}</div>}</div>
          <div className="card" style={{padding:"14px"}}>
            <div className="eb" style={{marginBottom:10,color:"var(--amber)",fontSize:9}}>TOLERANCE ADJUSTMENTS</div>
            <div style={{fontSize:12,color:"var(--ink-3)",marginBottom:12,lineHeight:1.5}}>Your plants handle more than the textbook says? Adjust here.</div>
            {[{label:"🌡️ Heat",value:heatAdj,set:setHeatAdj,unit:"°F",color:"var(--alert)"},{label:"❄️ Cold",value:coldAdj,set:setColdAdj,unit:"°F",color:"var(--steel)"},{label:"💨 Wind",value:windAdj,set:setWindAdj,unit:" mph",color:"var(--amber)"}].map(({label,value,set,unit,color})=>(
              <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:12,color:"var(--ink-2)"}}>{label}</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={()=>set(v=>Math.max(0,v-5))} style={{width:28,height:28,borderRadius:6,background:"var(--bg)",border:"1px solid var(--line)",color:"var(--ink)",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <div style={{fontSize:14,fontWeight:700,color:value>0?color:"var(--ink-3)",minWidth:50,textAlign:"center"}}>{value>0?`+${value}${unit}`:"—"}</div>
                  <button onClick={()=>set(v=>v+5)} style={{width:28,height:28,borderRadius:6,background:"var(--bg)",border:"1px solid var(--line)",color:"var(--ink)",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
              </div>
            ))}
          </div>
          <button onClick={saveGroup} style={{width:"100%",padding:"12px 24px",borderRadius:10,border:"none",background:"linear-gradient(135deg,var(--amber),var(--warn))",color:"var(--bg)",fontSize:15,fontWeight:700,cursor:"pointer"}}>{editingGroup?`Update ${selP.length} Plant${selP.length!==1?"s":""}`:`Save & Watch ${selP.length} Plant${selP.length!==1?"s":""}`}</button>
        </>}
        <div style={{marginTop:16,background:"var(--panel-2)",border:"1px dashed var(--line)",borderRadius:12,padding:16,textAlign:"center",fontSize:12,color:"var(--ink-3)",lineHeight:1.5}}>📸 <strong style={{color:"var(--ink-2)"}}>Can't find your plant?</strong><br/>Send me a photo in the chat and I'll identify it.</div>
      </>}

      {/* SETTINGS */}
      {scr==="set"&&<>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}><button onClick={()=>{setScr("home");}} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--amber)",padding:4}}>←</button><div className="st" style={{marginBottom:0}}>Settings</div></div>
        <div className="card" style={{padding:"14px"}}><div className="eb" style={{marginBottom:8,fontSize:9}}>LOCATION</div><div style={{fontSize:13,color:"var(--ink-2)"}}>{savedZip?`Zip: ${savedZip}`:"Leander, TX"}</div></div>
        <div className="card" style={{padding:"14px"}}><div className="eb" style={{marginBottom:10,fontSize:9}}>THEME</div><div style={{display:"flex",gap:8}}>{[{k:"dark",label:"Dark"},{k:"notebook",label:"Notebook"},{k:"cotton-candy",label:"Cotton Candy"}].map(t=>(<button key={t.k} onClick={()=>setTheme(t.k)} style={{flex:1,padding:"10px 6px",borderRadius:6,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:".08em",border:`1px solid ${theme===t.k?"var(--amber)":"var(--line)"}`,background:theme===t.k?"var(--panel-2)":"transparent",color:theme===t.k?"var(--amber)":"var(--ink-3)",fontWeight:theme===t.k?700:500}}>{t.label}</button>))}</div></div>
        <div className="card" style={{padding:"14px"}}><div className="eb" style={{marginBottom:8,fontSize:9}}>TESTING</div><div style={{fontSize:12,color:"var(--ink-3)",marginBottom:12,lineHeight:1.6}}>Forces extreme weather so all alerts fire.</div><button onClick={()=>{setTestMode(t=>!t);setDismissed({});setAlertAckedDate("");}} style={{width:"100%",padding:"12px",borderRadius:10,border:`1.5px solid ${testMode?"var(--alert)":"var(--line)"}`,background:testMode?"#7F1D1D":"transparent",color:testMode?"#FCA5A5":"var(--ink-3)",fontSize:14,fontWeight:700,cursor:"pointer"}}>{testMode?"⚠️ Test mode ON — tap to disable":"Test mode off"}</button></div>
        <div className="card" style={{padding:"14px"}}><div className="eb" style={{marginBottom:8,fontSize:9}}>HEAT THRESHOLD</div><div style={{fontSize:12,color:"var(--ink-3)",marginBottom:12,lineHeight:1.6}}>Counts as extreme-heat for the season tracker.</div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:13,color:"var(--ink-2)"}}>🌡️ Extreme heat at</span><div style={{display:"flex",alignItems:"center",gap:8}}><button onClick={()=>setHeatThreshold(t=>Math.max(80,t-5))} style={{width:32,height:32,borderRadius:8,background:"var(--bg)",border:"1px solid var(--line)",color:"var(--ink)",fontSize:18,cursor:"pointer"}}>−</button><span style={{fontSize:16,fontWeight:800,color:"var(--alert)",minWidth:54,textAlign:"center"}}>{heatThreshold}°F</span><button onClick={()=>setHeatThreshold(t=>Math.min(120,t+5))} style={{width:32,height:32,borderRadius:8,background:"var(--bg)",border:"1px solid var(--line)",color:"var(--ink)",fontSize:18,cursor:"pointer"}}>+</button></div></div></div>
        <div className="card" style={{padding:"14px"}}><div className="eb" style={{marginBottom:8,fontSize:9}}>NOTIFICATIONS</div><div style={{fontSize:12,color:"var(--ink-3)",marginBottom:12,lineHeight:1.6}}>Daily weather alerts when app is closed. Requires adding to home screen on iOS.</div>{pushEnabled?(<button onClick={unregisterPush} style={{width:"100%",padding:"12px",borderRadius:10,background:"transparent",color:"var(--ink-3)",border:"1.5px solid var(--line)",fontSize:14,fontWeight:600,cursor:"pointer"}}>🔔 Notifications on — tap to disable</button>):(<button onClick={registerPush} disabled={pushPending} style={{width:"100%",padding:"12px",borderRadius:10,background:"linear-gradient(135deg,var(--mint),var(--steel))",color:"var(--bg)",border:"none",fontSize:14,fontWeight:700,cursor:"pointer",opacity:pushPending?0.6:1}}>{pushPending?"Setting up…":"Enable notifications"}</button>)}</div>
        <div className="card" style={{padding:"14px"}}><div className="eb" style={{marginBottom:8,fontSize:9}}>DATA</div><button onClick={()=>{if(confirm("Delete all plants?")){setGroups([]);setDismissed({});setActionLog([]);setWateringLog([]);}}} style={{width:"100%",padding:"12px 24px",borderRadius:10,background:"transparent",color:"var(--alert)",border:"1.5px solid var(--alert)",fontSize:14,fontWeight:600,cursor:"pointer"}}>Delete All Plants</button></div>
      </>}
      </div>

      {/* PLANT DETAIL */}
      {detailPlant&&(
        <div onClick={()=>setDetailPlant(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:20,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"var(--panel)",borderRadius:"16px 16px 0 0",padding:"20px 18px 32px",width:"100%",maxWidth:480,border:"1px solid var(--line)",borderBottom:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}><div><div style={{fontSize:18,fontWeight:700,color:"var(--ink)"}}>{detailPlant.common_name}</div><div style={{fontSize:13,color:"var(--ink-3)",fontStyle:"italic"}}>{detailPlant.scientific_name}</div></div><button onClick={()=>setDetailPlant(null)} style={{background:"none",border:"none",fontSize:18,color:"var(--ink-3)",cursor:"pointer",padding:4}}>✕</button></div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",gap:10}}>
                <div style={{flex:1,padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--line)"}}><div style={{fontSize:10,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Temperature</div><div style={{fontSize:14,fontWeight:700,color:"var(--alert)"}}>🌡️ {detailPlant.min_temp_f}° – {detailPlant.max_temp_f}°F</div></div>
                <div style={{flex:1,padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--line)"}}><div style={{fontSize:10,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Wind</div><div style={{fontSize:14,fontWeight:700,color:"var(--amber)"}}>💨 ≤ {detailPlant.max_wind_mph} mph</div></div>
              </div>
              <div style={{padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--line)"}}><div style={{fontSize:10,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Rain</div><div style={{fontSize:14,fontWeight:700,color:detailPlant.rain_sensitive?"var(--steel)":"var(--mint)"}}>{detailPlant.rain_sensitive?"🌧️ Sensitive — cover or shelter":"✓ Handles rain fine"}</div></div>
              {(detailPlant.drought_tolerant||DROUGHT_NAMES.has(detailPlant.common_name))&&<div style={{padding:"10px 12px",borderRadius:10,background:"#0F1F0F",border:"1px solid #1A3A1A"}}><div style={{fontSize:14,fontWeight:700,color:"#86EFAC"}}>💧 Drought tolerant</div></div>}
              {detailPlant.notes&&<div style={{padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--line)"}}><div style={{fontSize:10,color:"var(--ink-3)",textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Notes</div><div style={{fontSize:13,color:"var(--ink-2)",lineHeight:1.5}}>{detailPlant.notes}</div></div>}
            </div>
          </div>
        </div>
      )}

      {/* ALERT MODAL */}
      {alertModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:30,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 20px"}}>
          <div style={{background:"var(--panel)",borderRadius:16,padding:"24px 20px",width:"100%",maxWidth:400,border:"1px solid var(--line)"}}>
            <div style={{fontSize:16,fontWeight:700,color:"var(--ink)",marginBottom:16}}>Heads up 🌿</div>
            {alertModal.map((m,i)=>(<div key={i} style={{display:"flex",gap:10,marginBottom:12,padding:"10px 12px",borderRadius:10,background:"var(--bg)",border:"1px solid var(--line)"}}><div style={{fontSize:18,flexShrink:0}}>{m.icon}</div><div style={{fontSize:13,color:"var(--ink-2)",lineHeight:1.5}}>{m.text}</div></div>))}
            <button onClick={dismissAlertModal} style={{width:"100%",marginTop:4,padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,var(--amber),var(--warn))",color:"var(--bg)",fontSize:15,fontWeight:700,cursor:"pointer"}}>Got it</button>
          </div>
        </div>
      )}

      {/* WATER MODAL */}
      {showWaterModal&&(
        <div onClick={()=>setShowWaterModal(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:20,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"var(--panel)",borderRadius:"16px 16px 0 0",padding:"20px 18px 32px",width:"100%",maxWidth:480,border:"1px solid var(--line)",borderBottom:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontSize:18,fontWeight:700,color:"var(--ink)"}}>💧 Log Watering</div><button onClick={()=>setShowWaterModal(false)} style={{background:"none",border:"none",fontSize:18,color:"var(--ink-3)",cursor:"pointer",padding:4}}>✕</button></div>
            {waterInfo?.earlyTrigger&&<div style={{padding:"8px 12px",borderRadius:8,background:"#2A1A08",border:"1px solid var(--amber)44",fontSize:12,color:"var(--amber)",marginBottom:14}}>🌡️ {getConsecHeat(timeline)} consecutive heat alert days — watering early.</div>}
            <div className="eb" style={{marginBottom:6,color:"var(--amber)",fontSize:9}}>NOTES</div>
            <textarea value={waterNotes} onChange={e=>setWaterNotes(e.target.value.slice(0,500))} rows={3} placeholder="e.g. skipped snake plant and pothos" style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid var(--line)",fontSize:13,background:"var(--bg)",color:"var(--ink)",outline:"none",fontFamily:"inherit",boxSizing:"border-box",resize:"none",lineHeight:1.5}}/>
            <button onClick={logWatering} style={{width:"100%",marginTop:12,padding:"13px 24px",borderRadius:10,border:"none",background:"linear-gradient(135deg,var(--mint),var(--steel))",color:"var(--bg)",fontSize:15,fontWeight:700,cursor:"pointer"}}>Mark as watered today</button>
          </div>
        </div>
      )}
      </div>
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
